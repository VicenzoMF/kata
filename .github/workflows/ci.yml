name: ci

# Remote feedback layer for issue #46. Local Lefthook + PostToolUse hook are
# best-effort; this workflow is the gate that catches anything they miss
# before a PR can merge into main.
#
# Required check: configure branch protection on `main` to require the `ci`
# job to pass (Settings → Branches, or `gh api repos/:owner/:repo/branches/main/protection`).

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    env:
      HURL_VERSION: 8.0.1

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm test

      - name: Run kata verify (L3 guardrail)
        # Mirrors the local pre-commit gate (#127, lefthook 04-verify) so CI and
        # hooks agree. Runs after typecheck, whose `pretypecheck` script builds
        # the `kata` bin, so the `kata verify` entry resolves. Iterates every
        # example app (hello, shop, ...); a non-zero exit fails the build. No
        # pipe so verify's exit code propagates to the `|| exit 1` guard.
        run: |
          for app in examples/*/; do
            pnpm exec kata verify "$app" || exit 1
          done

      - name: Install hurl
        run: |
          curl -fsSL -o /tmp/hurl.deb \
            "https://github.com/Orange-OpenSource/hurl/releases/download/${HURL_VERSION}/hurl_${HURL_VERSION}_amd64.deb"
          sudo dpkg -i /tmp/hurl.deb
          hurl --version

      - name: Run hurl E2E (hello + shop)
        # Boot every example that ships a Hurl suite, each on its own port, so the
        # suites run against live servers in parallel without colliding (#178):
        # hello keeps :3000; shop runs on :3001 (PORT) and its suite — whose URLs
        # are templated as {{host}} — is pointed there with a trailing --variable
        # (the last definition wins, overriding the script's localhost:3000
        # default). A failing request in either suite fails this step, which fails
        # the required `ci` job and blocks the merge. The trap tears both servers
        # down on any exit so a failure never leaks a process.
        run: |
          pnpm --filter=hello start &
          HELLO_PID=$!
          PORT=3001 pnpm --filter=shop start &
          SHOP_PID=$!
          trap 'kill "$HELLO_PID" "$SHOP_PID" 2>/dev/null || true' EXIT
          npx --yes wait-on tcp:3000 tcp:3001 --timeout 30000
          pnpm --filter=hello hurl
          pnpm --filter=shop run hurl --variable host=http://localhost:3001
